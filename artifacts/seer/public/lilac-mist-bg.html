<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lilac Mist Background</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#F3EEF8}
  a{color:#B48FD9}a:hover{color:#9A6FC7}
  #bg{position:fixed;inset:0;width:100%;height:100%;display:block;
      background:linear-gradient(115deg,#F3EEF8 0%,#EDE2F5 30%,#DFCDF0 55%,#EDE2F5 78%,#FBF8FE 100%)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<script>
(function(){
"use strict";
var canvas=document.getElementById('bg');
var gl=canvas.getContext('webgl',{alpha:false,antialias:false,depth:false,stencil:false,preserveDrawingBuffer:true});
if(!gl)return; // CSS gradient fallback stays

var VERT="attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}";
var NPTS=64;
var FRAG=
"precision mediump float;\n"+
"uniform vec2 uRes;uniform float uT;uniform vec4 uPts["+NPTS+"];\n"+
"uniform float uSize,uSoft,uMist,uGlow,uDark,uSpark,uGrain;\n"+
"uniform vec3 uMistDark,uRimDark;\n"+
"float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}\n"+
"float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);\n"+
" return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}\n"+
"float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p=p*2.03+17.1;a*=.5;}return v;}\n"+
// lilac palette
"vec3 C0=vec3(0.953,0.933,0.973);\n"+ // #F3EEF8
"vec3 C1=vec3(0.929,0.886,0.961);\n"+ // #EDE2F5
"vec3 C2=vec3(0.875,0.804,0.941);\n"+ // #DFCDF0
"vec3 C3=vec3(0.812,0.702,0.910);\n"+ // #CFB3E8
"vec3 CW=vec3(0.976,0.957,1.000);\n"+ // lilac-white highlight #F9F4FF
"vec3 CP=vec3(0.988,0.906,0.937);\n"+ // pastel pink glow #FCE7EF
// dark-mode palette (#150824 base, #291640 / #2e1553 highlights)
"vec3 K3=vec3(.08235,.03137,.14118),K2=vec3(.08235,.03137,.14118),K1=vec3(.16078,.08627,.25098),K0=vec3(.18039,.08235,.32549),KW=vec3(.18039,.08235,.32549);\n"+
"vec3 pal(float t){\n"+
" vec3 a3=mix(C3,K3,uDark),a2=mix(C2,K2,uDark),a1=mix(C1,K1,uDark),a0=mix(C0,K0,uDark),aw=mix(CW,KW,uDark);\n"+
" vec3 c=mix(a3,a2,smoothstep(0.,.35,t));\n"+
" c=mix(c,a1,smoothstep(.35,.62,t));\n"+
" c=mix(c,a0,smoothstep(.62,.82,t));\n"+
" return mix(c,aw,smoothstep(.82,1.,t));}\n"+
// sparse 4-point sparkles, two cell layers for size variety
"float stars(vec2 st){\n"+
" float s=0.;\n"+
" for(int l=0;l<2;l++){\n"+
"  float sc=l==0?5.5:9.5;\n"+
"  vec2 g=st*sc;vec2 id=floor(g);vec2 f=fract(g)-.5;\n"+
"  float rn=h(id+float(l)*13.7);\n"+
"  if(rn<.22){\n"+
"   vec2 d=f-(vec2(h(id+1.3),h(id+2.7))-.5)*.65;\n"+
"   float size=mix(.35,1.,h(id+4.2))*(l==0?1.:.55);\n"+
"   float tw=.25+.75*pow(.5+.5*sin(uT*(.5+rn*1.4)+rn*40.),3.);\n"+
// 4-point star: bright core, thin tapered spikes along both axes
"   vec2 dd=abs(d);\n"+
"   float ext=max(0.,1.-length(d)/(.26*size));\n"+
"   float k=.0015*size;\n"+
"   float f=k/(dd.x*dd.y+k);\n"+
"   s+=pow(f,2.)*pow(ext,2.5)*tw;\n"+
"  }}\n"+
" return s;}\n"+
"void main(){\n"+
" vec2 uv=gl_FragCoord.xy/uRes;\n"+
" float asp=uRes.x/uRes.y;\n"+
" vec2 st=vec2(uv.x*asp,uv.y);\n"+
" float t=uT*.025;\n"+
// cursor mist: displacement + veil
" vec2 disp=vec2(0.);float mist=0.;\n"+
" for(int i=0;i<"+NPTS+";i++){vec4 P=uPts[i];if(P.w<=0.)continue;\n"+
"   vec2 d=st-vec2(P.x*asp,P.y);float age=P.z;\n"+
"   float rad=mix(.06,.34,age)*uSize;\n"+
"   float r=length(d)/rad;\n"+
"   float fall=exp(-r*r/uSoft)*P.w*(1.-age)*smoothstep(0.,.12,age);\n"+
"   vec2 dir=r>0.001?d/(r*rad):vec2(0.);\n"+
"   disp+=(dir*fall*.05+vec2(-dir.y,dir.x)*fall*.03)*uSize;\n"+
"   mist+=fall;}\n"+
" mist=1.-exp(-mist*.75);\n"+
// slow-drifting domain-warped gradient
" vec2 q=vec2(fbm(st*1.1+t),fbm(st*1.1-t+5.2));\n"+
" vec2 wp=st*1.25+ (q-.5)*.9 + disp;\n"+
" float n=fbm(wp+vec2(t*.6,-t*.4));\n"+
// diagonal luminous drift like the reference (bright upper-right)
" n=n*.72+ .28*smoothstep(-.2,1.3,uv.x*.6+uv.y*.55);\n"+
" vec3 col=pal(n);\n"+
// cloud-like veil: multi-scale fbm erosion so it breaks into wisps
" float cl=fbm(st*3.+disp*4.+vec2(t*1.6,-t*1.1));\n"+
" float cl2=fbm(st*6.5-disp*3.+vec2(-t*2.,t*1.4));\n"+
" float wisp=mist*(.25+.75*smoothstep(.25,.85,cl*.6+cl2*.4+.3*mist));\n"+
" float m=clamp(wisp*uMist,0.,1.);\n"+
" m*=.6+.4*cl2;\n"+
" float rim=smoothstep(.005,.08,m)*(1.-smoothstep(.08,.35,m))*(.4+.6*cl);\n"+
" vec3 rimC=mix(CP,uRimDark,uDark);\n"+
" col=mix(col,rimC,rim*uGlow);\n"+
" vec3 mistC=mix(CW,uMistDark,uDark);\n"+
" col=mix(col,mistC,pow(smoothstep(.04,1.,m),1.3)*mix(.5,.4,uDark));\n"+
// sparkles — #CEB2EA in both modes
" if(uSpark>0.){vec3 sC=vec3(.808,.698,.918);\n"+
"  col=mix(col,sC,clamp(stars(st+vec2(0.,t*.15))*1.15,0.,1.)*uSpark);}\n"+
// live grain
" col+=(h(gl_FragCoord.xy+fract(uT)*7.3)-.5)*uGrain;\n"+
" gl_FragColor=vec4(col,1.);}";

function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
var prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);gl.useProgram(prog);
var buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
var loc=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
var uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT'),uPts=gl.getUniformLocation(prog,'uPts');
var uSize=gl.getUniformLocation(prog,'uSize'),uSoft=gl.getUniformLocation(prog,'uSoft'),uMist=gl.getUniformLocation(prog,'uMist'),uGlow=gl.getUniformLocation(prog,'uGlow');
var uDark=gl.getUniformLocation(prog,'uDark'),uSpark=gl.getUniformLocation(prog,'uSpark'),uGrain=gl.getUniformLocation(prog,'uGrain');
var uMistDark=gl.getUniformLocation(prog,'uMistDark'),uRimDark=gl.getUniformLocation(prog,'uRimDark');
var darkNow=0; // eased so site-driven theme switches fade smoothly

// #rrggbb -> [0..1,0..1,0..1], falls back to def (already 0..1) on bad input
function hexToRgb(hex,def){
  if(typeof hex!=='string')return def;
  var m=/^#?([0-9a-f]{6})$/i.exec(hex.trim());
  if(!m)return def;
  var n=parseInt(m[1],16);
  return [((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255];
}

// render at reduced resolution — gradients are soft, saves battery
var MAXW=1280;
function resize(){
  var w=canvas.clientWidth||innerWidth,hgt=canvas.clientHeight||innerHeight;
  var s=Math.min(1,MAXW/w)*Math.min(window.devicePixelRatio||1,1.5);
  s=Math.min(s,1); // never above native reduced cap
  canvas.width=Math.max(2,Math.round(w*s));
  canvas.height=Math.max(2,Math.round(hgt*s));
  gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener('resize',resize,{passive:true});
addEventListener('load',resize,{passive:true});resize();

// pointer trail
var LIFE=3.2, pts=[], last={x:-1,y:-1}, ptData=new Float32Array(NPTS*4);
function addPt(cx,cy){
  var r=canvas.getBoundingClientRect();
  var x=(cx-r.left)/r.width, y=1-(cy-r.top)/r.height;
  var dx=x-last.x, dy=y-last.y;
  if(last.x>=0 && dx*dx+dy*dy<0.0006)return;
  last.x=x;last.y=y;
  pts.push({x:x,y:y,b:performance.now()/1000,s:0.75+Math.random()*0.35});
  if(pts.length>NPTS)pts.shift();
}
addEventListener('pointermove',function(e){addPt(e.clientX,e.clientY);},{passive:true});
addEventListener('touchmove',function(e){var t=e.touches[0];if(t)addPt(t.clientX,t.clientY);},{passive:true});
// Exposed so an embedding parent page can forward cursor position directly
// (e.g. when this file is used in an iframe behind other page content).
window.pushCursor=addPt;

var vis=!document.hidden;
document.addEventListener('visibilitychange',function(){vis=!document.hidden;});

function frame(){
  requestAnimationFrame(frame);
  if(!vis)return;
  if(canvas.width<4||canvas.height<4)resize(); // layout may not exist at init
  var now=performance.now()/1000;
  for(var i=pts.length-1;i>=0;i--){if(now-pts[i].b>LIFE)pts.splice(i,1);}
  ptData.fill(0);
  for(var j=0;j<pts.length;j++){
    var p=pts[j],a=(now-p.b)/LIFE;
    ptData[j*4]=p.x;ptData[j*4+1]=p.y;ptData[j*4+2]=a;ptData[j*4+3]=p.s;
  }
  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uT,now);
  var T=window.TWEAKS||{};
  gl.uniform1f(uSize,T.highlightSize!=null?T.highlightSize:0.3);
  gl.uniform1f(uSoft,T.mistSoftness!=null?T.mistSoftness:6);
  gl.uniform1f(uMist,T.mistAmount!=null?T.mistAmount:1.5);
  gl.uniform1f(uGlow,T.pinkGlow!=null?T.pinkGlow:0.25);
  var wantDark=window.MIST_DARK!=null?(window.MIST_DARK?1:0):(T.darkMode?1:0);
  darkNow+=(wantDark-darkNow)*0.08;
  gl.uniform1f(uDark,darkNow);
  gl.uniform1f(uSpark,((T.sparkles==null||T.sparkles)?(T.sparkleAmount!=null?T.sparkleAmount:0.5):0)*(1-0.25*darkNow));
  gl.uniform1f(uGrain,T.grain!=null?T.grain:0.05);
  var mistDark=hexToRgb(T.mistDarkColor,[0.30980,0.11373,0.60000]);
  var rimDark=hexToRgb(T.rimDarkColor,[0.30980,0.11373,0.60000]);
  gl.uniform3f(uMistDark,mistDark[0],mistDark[1],mistDark[2]);
  gl.uniform3f(uRimDark,rimDark[0],rimDark[1],rimDark[2]);
  gl.uniform4fv(uPts,ptData);
  gl.drawArrays(gl.TRIANGLES,0,3);
}
frame();
})();
</script>
<script>
// Baked settings from Tweaks. Dark mode: set window.MIST_DARK = true/false from your site.
// mistDarkColor / rimDarkColor: cursor-trail colors used only when dark mode
// is active (hex strings, e.g. "#d4b8ff"). Live-tunable from the console —
// no rebuild needed, changes apply on the next animation frame.
window.TWEAKS = {"highlightSize":0.55,"mistSoftness":6,"mistAmount":1.5,"pinkGlow":0.6,"sparkles":true,"sparkleAmount":1,"grain":0.01,"darkMode":false,"mistDarkColor":"#4F1D99","rimDarkColor":"#4F1D99"};
</script>



</body></html>
